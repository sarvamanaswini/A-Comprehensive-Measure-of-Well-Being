<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDI Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .subtitle {
            font-size: 1rem;
            font-style: italic;
            color: #ffd166;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .classification-output {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd166; /* Matches the golden-yellow classification highlights */
            text-shadow: 0 0 12px rgba(255, 209, 102, 0.4);
            border: 1px solid rgba(114, 9, 183, 0.6);
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Human Development Index</h1>
        <div class="subtitle">A machine learning web application using flask</div>
        
        <div class="form-card">
            <div class="classification-output">
                {{ prediction_text }}
            </div>

            <a href="/predict_form" class="back-link">← Make Another Prediction</a>
        </div>
    </div>

</body>
</html>
